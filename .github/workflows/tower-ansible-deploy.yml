name: Deploy tower with Ansible
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
on:
  workflow_dispatch:
    inputs:
      force_schedule_mode:
        description: 'Force playbook to run in "schedule" mode'
        required: false
        type: boolean
        default: false
  workflow_run:
    workflows:
      - Deploy tower with OpenTofu
    types:
      - completed
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - '.github/workflows/tower-ansible-deploy.yml'
      - 'tower/ansible/**'
      - 'tower/containers/**'
      - 'requirements.txt'
  schedule:
    - cron: '0 0 * * *'  # Every day at midnight
jobs:
  run-ansible:
    runs-on: ubuntu-latest
    environment: tower
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up inventory, Python version, and SSH key
        env:
          HOST: ${{ secrets.HOST }}
          USER: ${{ secrets.USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "PYTHON_VERSION=$(cat .python-version)" >> "$GITHUB_ENV"
          if [ -z "$HOST" ] || [ -z "$USER" ]; then
            echo "HOST or USER secret is missing!" >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" | base64 --decode > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts
          echo "$HOST ansible_user=$USER ansible_ssh_private_key=~/.ssh/id_ed25519" > inventory
      - name: Cache Ansible Galaxy requirements
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.ansible
          key: ansible-galaxy-${{ hashFiles('tower/ansible/requirements.yml') }}
          restore-keys: |
            ansible-galaxy-
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: '.python-version'
          check-latest: true
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: 'requirements.txt'
      - name: Install Ansible
        run: |
          uv venv
          uv pip install --python .venv/bin/python -r requirements.txt
      - name: Install Ansible Galaxy requirements
        run: |
          uv run ansible-galaxy install -r tower/ansible/requirements.yml
      - name: Run Ansible Playbook
        env:
          ANSIBLE_CONFIG: tower/ansible/ansible.cfg
          ANSIBLE_STRATEGY_PLUGINS: ${{ github.workspace }}/.venv/lib/python${{ env.PYTHON_VERSION }}/site-packages/ansible_mitogen/plugins/strategy
          CLOUDFLARED_TOKEN: ${{ secrets.CLOUDFLARED_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SCHEDULED_RUN: ${{ github.event_name == 'schedule' || github.event.inputs.force_schedule_mode == 'true' }}
          DNS_SEARCH_DOMAIN: ${{ secrets.DNS_SEARCH_DOMAIN }}
        run: |
          uv run ansible-playbook -i inventory tower/ansible/playbook.yml --private-key ~/.ssh/id_ed25519
