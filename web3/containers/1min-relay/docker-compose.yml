services:
  1min-relay:
    image: ghcr.io/thundersquared/1min-relay:v1.1.0@sha256:37e09c2a8db5443d160ae983d0f21433d0aee2d3479409e02dd5aacf1332114a
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    networks:
      - app-infra

networks:
  app-infra:
    external: true
