services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.9.2
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:3005:8080"
    volumes:
      - open_webui:/app/backend/data
    env_file:
      - .env
    networks:
      - app-infra

volumes:
  open_webui:

networks:
  app-infra:
    external: true
