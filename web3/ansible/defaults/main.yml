---
scheduled_run: "{{ lookup('env', 'SCHEDULED_RUN') | bool }}"
dns_search_domain: "{{ lookup('env', 'DNS_SEARCH_DOMAIN') }}"
nginx_dh_size: 4096
os_env_umask: "022"
os_user_pw_ageing: false
os_auth_pam_passwdqc_enable: false
sftp_enabled: true
ssh_allow_tcp_forwarding: 'local'
ssh_print_last_log: true
ssh_permit_root_login: "without-password"
ssh_permit_tunnel: "yes"
ssh_client_password_login: true
ssh_server_password_login: true
sshd_authenticationmethods: "publickey,password publickey password"
sysctl_overwrite:
  net.ipv4.ip_forward: 1
  net.ipv6.conf.all.forwarding: 1
  vm.swappiness: 5
  net.core.rmem_max: 7500000
  net.core.wmem_max: 7500000
  # Conntrack tuning to prevent table exhaustion with many containers
  net.netfilter.nf_conntrack_max: 262144
  net.netfilter.nf_conntrack_tcp_timeout_established: 86400
  net.netfilter.nf_conntrack_tcp_timeout_time_wait: 30

# PHP extensions to build from PECL per PHP version.
# Only versions whose php-fpm is installed on the host are processed.
# Add an entry to enable a new extension on the next playbook run.
php_custom_extensions:
  "8.4":
    - { name: brotli, version: "0.18.3", apt_deps: ["libbrotli-dev"] }
    - { name: zstd,   version: "0.15.2", apt_deps: ["libzstd-dev"]   }
  "8.5":
    - { name: brotli, version: "0.18.3", apt_deps: ["libbrotli-dev"] }
    - { name: zstd,   version: "0.15.2", apt_deps: ["libzstd-dev"]   }
