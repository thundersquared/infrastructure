---
- name: Import common playbook
  import_playbook: ../../common/ansible/playbook.yml

- name: web1 specific configuration
  hosts: all
  become: true
  vars_files:
    - ../../common/ansible/defaults/main.yml
  roles:
    - role: system/php
  collections:
    - devsec.hardening
  tasks:
    - name: Apply nginx hardening
      include_role:
        name: devsec.hardening.nginx_hardening
      when: scheduled_run
