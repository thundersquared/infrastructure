services:
  roundcubemail:
    image: roundcube/roundcubemail:1.7.2-apache@sha256:89083b9d7034e9a6345248db296e2fa6870533d24724741d3a523433433ffde7
    container_name: roundcubemail
    restart: unless-stopped
    tmpfs:
      - /tmp
    volumes:
      - ./www:/var/www/html
      - ./db/sqlite:/var/roundcube/db
    ports:
      - "127.0.0.1:3002:80"
    env_file:
      - .env
    networks:
      - app-infra

networks:
  app-infra:
    external: true
