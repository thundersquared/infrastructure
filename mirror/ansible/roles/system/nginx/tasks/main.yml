---
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: false

- name: Create ACME webroot directory
  ansible.builtin.file:
    path: "{{ nginx_certbot_webroot }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Create media directory
  ansible.builtin.file:
    path: "{{ nginx_media_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Check if certificate exists
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ nginx_hostname }}/fullchain.pem"
  register: nginx_cert_stat

- name: Deploy HTTP-only vhost (pre-cert)
  ansible.builtin.template:
    src: vhost_http.conf.j2
    dest: "/etc/nginx/sites-available/{{ nginx_vhost_name }}"
    owner: root
    group: root
    mode: "0644"
  when: not nginx_cert_stat.stat.exists
  notify: Reload nginx

- name: Enable vhost
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ nginx_vhost_name }}"
    dest: "/etc/nginx/sites-enabled/{{ nginx_vhost_name }}"
    state: link

- name: Start and enable nginx
  ansible.builtin.systemd_service:
    name: nginx
    state: started
    enabled: true

- name: Flush handlers so nginx is live for ACME challenge
  ansible.builtin.meta: flush_handlers

- name: Obtain certificate via certbot
  ansible.builtin.include_role:
    name: geerlingguy.certbot
  vars:
    certbot_install_method: package
    certbot_create_if_missing: true
    certbot_create_method: webroot
    certbot_webroot_path: "{{ nginx_certbot_webroot }}"
    certbot_admin_email: "{{ nginx_certbot_email }}"
    certbot_certs:
      - domains:
          - "{{ nginx_hostname }}"

- name: Deploy HTTPS vhost (post-cert)
  ansible.builtin.template:
    src: vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ nginx_vhost_name }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Flush handlers to apply HTTPS vhost
  ansible.builtin.meta: flush_handlers
