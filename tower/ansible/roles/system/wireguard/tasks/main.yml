---
- name: Install WireGuard
  ansible.builtin.apt:
    name: wireguard
    state: present
    update_cache: false

- name: Create /etc/wireguard directory
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Generate WireGuard private key
  ansible.builtin.shell:
    cmd: wg genkey > /etc/wireguard/private.key
    creates: /etc/wireguard/private.key

- name: Set private key permissions
  ansible.builtin.file:
    path: /etc/wireguard/private.key
    owner: root
    group: root
    mode: "0600"

- name: Read private key
  ansible.builtin.slurp:
    src: /etc/wireguard/private.key
  register: wg_private_key_b64

- name: Set private key fact
  ansible.builtin.set_fact:
    wg_private_key: "{{ wg_private_key_b64.content | b64decode | trim }}"

- name: Deploy wg0.conf
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    owner: root
    group: root
    mode: "0600"
  notify: Reload WireGuard

- name: Enable and start wg-quick@wg0
  ansible.builtin.systemd:
    name: wg-quick@wg0
    enabled: true
    state: started
