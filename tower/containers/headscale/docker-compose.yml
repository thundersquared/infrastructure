services:
  headscale:
    image: headscale/headscale:v0.29.2@sha256:d337f1be4a9155b330aa9077bf6c82d24ff0581b8e69390ebc6d7c623bb339ce
    command: serve
    restart: unless-stopped
    ports:
      - "443:443/tcp"
      - "3478:3478/udp"
    volumes:
      - /opt/containers/headscale/data:/var/lib/headscale
      - /opt/containers/headscale/config.yaml:/etc/headscale/config.yaml:ro
    tmpfs:
      - /var/run/headscale
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    networks:
      - app-infra

networks:
  app-infra:
    external: true
