---
- name: Ensure /opt/containers exists
  file:
    path: /opt/containers
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Copy containers directory to remote node
  copy:
    src: "{{ playbook_dir }}/../containers/"
    dest: /opt/containers/
    owner: root
    group: root
    mode: '0755'
  notify: Restart containers

- name: Create shared app-infra Docker network
  community.docker.docker_network:
    name: app-infra
    enable_ipv6: "{{ (lookup('env', 'DOCKER_IPV6_SUBNET') | length > 0) | bool }}"
    ipam_config: "{{ [{'subnet': lookup('env', 'DOCKER_IPV6_SUBNET')}] if (lookup('env', 'DOCKER_IPV6_SUBNET') | length > 0) else omit }}"
    internal: false
    scope: "global"
    state: present

- name: Create cloudflared .env file
  copy:
    content: |
      TUNNEL_TOKEN={{ lookup('env', 'CLOUDFLARED_TOKEN') }}
    dest: /opt/containers/cloudflared/.env
    owner: root
    group: root
    mode: '0600'
  when: lookup('env', 'CLOUDFLARED_TOKEN') | length > 0

# The frankenphp container mounts /opt/hypebun/<env> read-only and overlays a
# tmpfs/volume on shared/cache and shared/uploads. Those mountpoints must exist
# on the host first, otherwise Docker cannot create them under the read-only
# mount and the container fails to start.
#
# Ownership: PHP runs as root in the default FrankenPHP image, so root:root is
# correct. uploads/ is the only path PHP writes (user media) and is made
# group-writable so a future switch to a non-root runtime only needs a chown.
# cache/ is a tmpfs whose perms come from the mount, so the host dir is just a
# mountpoint. releases/ and shared/config.php are read-only to the app.
- name: Ensure Hypebun base/code host directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /opt/hypebun
    - /opt/hypebun/prod
    - /opt/hypebun/prod/releases
    - /opt/hypebun/prod/shared
    - /opt/hypebun/prod/shared/cache
    - /opt/hypebun/test
    - /opt/hypebun/test/releases
    - /opt/hypebun/test/shared
    - /opt/hypebun/test/shared/cache
  when: "'hypebun-web' in docker_stacks"

- name: Ensure Hypebun uploads directories exist (writable by the app)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0775'
  loop:
    - /opt/hypebun/prod/shared/uploads
    - /opt/hypebun/test/shared/uploads
  when: "'hypebun-web' in docker_stacks"

- name: Deploy docker-compose projects
  include_tasks: deploy_stack.yml
  loop: "{{ docker_stacks | dict2items }}"

- name: Clean up Docker system
  community.docker.docker_prune:
    containers: yes
    images: yes
    images_filters:
      dangling: false
    networks: yes
    builder_cache: yes
