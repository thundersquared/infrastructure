---
- name: Ensure /opt/containers exists
  file:
    path: /opt/containers
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Copy containers directory to remote node
  copy:
    src: "{{ playbook_dir }}/../containers/"
    dest: /opt/containers/
    owner: root
    group: root
    mode: '0755'
  notify: Restart containers

- name: Create shared app-infra Docker network
  community.docker.docker_network:
    name: app-infra
    enable_ipv6: "{{ (lookup('env', 'DOCKER_IPV6_SUBNET') | length > 0) | bool }}"
    ipam_config: "{{ [{'subnet': lookup('env', 'DOCKER_IPV6_SUBNET')}] if (lookup('env', 'DOCKER_IPV6_SUBNET') | length > 0) else omit }}"
    internal: false
    scope: "global"
    state: present

- name: Create cloudflared .env file
  copy:
    content: |
      TUNNEL_TOKEN={{ lookup('env', 'CLOUDFLARED_TOKEN') }}
    dest: /opt/containers/cloudflared/.env
    owner: root
    group: root
    mode: '0600'
  when: lookup('env', 'CLOUDFLARED_TOKEN') | length > 0

# The frankenphp container mounts /opt/hypebun/<env> read-only as the app
# docroot (a plain git clone you create and `git pull` to update). uploads/ is
# git-ignored and lives inside the clone, bind-mounted back read-write; its
# cache/ subdir is a tmpfs. Only ensure the base dir exists here — the env dirs
# (and their uploads/) are populated by `git clone` + your migrated media.
- name: Ensure Hypebun base directory exists
  ansible.builtin.file:
    path: /opt/hypebun
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: "'hypebun-web' in docker_stacks"

- name: Deploy docker-compose projects
  include_tasks: deploy_stack.yml
  loop: "{{ docker_stacks | dict2items }}"

- name: Clean up Docker system
  community.docker.docker_prune:
    containers: yes
    images: yes
    images_filters:
      dangling: false
    networks: yes
    builder_cache: yes
