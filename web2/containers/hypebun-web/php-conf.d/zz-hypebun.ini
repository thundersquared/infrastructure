; Hypebun PHP overrides for FrankenPHP (PHP 8.5)

; --- Database over UNIX socket (zero-TCP app -> DB) ---
; The MariaDB container shares its socket via the db_socket volume mounted at
; /sockets. With DATABASE_SERVER='localhost' and DATABASE_PORT=null in config.php,
; mysqli/pdo_mysql connect through this socket instead of TCP.
mysqli.default_socket = /sockets/mysqld.sock
pdo_mysql.default_socket = /sockets/mysqld.sock

; --- OPcache tuning (ported from the legacy php-fpm stack) ---
opcache.enable = 1
opcache.memory_consumption = 64M
opcache.interned_strings_buffer = 4
opcache.max_accelerated_files = 2048
opcache.revalidate_freq = 3
opcache.enable_cli = 0
opcache.load_comments = 0
opcache.enable_file_override = 1
opcache.validate_timestamps = 1
; Enabling may cause shmop deadlocks
opcache.huge_code_pages = 1
; Cannot redeclare class errors, more prevalent on large servers
opcache.dups_fix = 0
