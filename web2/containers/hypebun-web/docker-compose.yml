services:
  frankenphp:
    # Custom image: base FrankenPHP + mysqli/gd/intl/... required by AltumCode.
    build:
      context: .
      dockerfile: Dockerfile
    image: hypebun-frankenphp:1.12.4-php8.5
    container_name: hypebun-web
    restart: unless-stopped
    depends_on:
      - db
    # tls-check.php (on-demand TLS gate) needs MYSQL_* creds to reach the
    # domains DB over the socket, plus the HYPEBUN_* vars for the DNS pre-check.
    # All live in .env (the same file the db service uses).
    env_file: .env
    cap_drop:
      - ALL
    cap_add:
      # Bind privileged ports 80/443 (HTTP + ACME challenges for on-demand TLS)
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    networks:
      - app-infra
    volumes:
      # FrankenPHP reads its Caddyfile from /etc/frankenphp/Caddyfile.
      - ./Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./php-conf.d/zz-hypebun.ini:/usr/local/etc/php/conf.d/zz-hypebun.ini:ro
      # On-demand TLS authorization script — stack-owned, independent of the app
      # code, so the cert gate works even before the app is cloned.
      - ./tls-check.php:/opt/tls/tls-check.php:ro
      # App code lives on the host under /opt/hypebun/<env> as a plain git
      # clone (git pull to update). Mounted READ-ONLY: the app must not mutate
      # its own code.
      - /opt/hypebun/prod:/app/prod:ro
      - /opt/hypebun/test:/app/test:ro
      # Mutable user media: uploads/ is git-ignored in the app repo, so it lives
      # inside the clone at /opt/hypebun/<env>/uploads. Bind it back read-write
      # over the read-only code mount so the app can write user media.
      - /opt/hypebun/prod/uploads:/app/prod/uploads
      - /opt/hypebun/test/uploads:/app/test/uploads
      # Caddy certificate + ACME account store. MUST persist so on-demand TLS
      # certificates survive container restarts/recreations.
      - caddy_data:/data
      - caddy_config:/config
      # MySQL UNIX socket shared from the db service (zero-TCP app -> DB).
      - db_socket:/sockets:ro
    tmpfs:
      # Image/biolink render cache is ephemeral; keep it off disk and backups.
      - /app/prod/uploads/cache
      - /app/test/uploads/cache

  db:
    image: mariadb:12.3.2
    container_name: hypebun-db
    restart: unless-stopped
    # Data-store image: exempt from cap_drop / no-new-privileges. The
    # entrypoint runs as root and uses gosu (needs SETUID/SETGID).
    command: >-
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    env_file: .env
    networks:
      - app-infra
    ports:
      # Localhost-only, for DBA access / imports.
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Shared socket directory consumed by frankenphp via db_socket:/sockets.
      - db_socket:/run/mysqld
      - ./my.cnf:/etc/mysql/conf.d/zz-hypebun.cnf:ro

networks:
  app-infra:
    external: true

volumes:
  caddy_data:
  caddy_config:
  db_data:
  db_socket:
