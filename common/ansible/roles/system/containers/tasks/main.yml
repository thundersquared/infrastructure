---
- name: Ensure /opt/containers exists
  file:
    path: /opt/containers
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Copy common containers directory to remote node
  copy:
    src: "{{ playbook_dir }}/../../common/containers/"
    dest: /opt/containers/
    owner: root
    group: root
    mode: '0755'
  when: common_containers_dir is not defined or common_containers_dir
  notify: Restart containers

- name: Copy host-specific containers directory to remote node
  copy:
    src: "{{ playbook_dir }}/../containers/"
    dest: /opt/containers/
    owner: root
    group: root
    mode: '0755'
  when: host_containers_dir is not defined or host_containers_dir
  notify: Restart containers

- name: Create shared app-infra Docker network
  community.docker.docker_network:
    name: app-infra
    internal: false
    scope: "global"
    state: present

- name: Deploy docker-compose projects
  community.docker.docker_compose_v2:
    project_src: "/opt/containers/{{ item }}"
    state: present
  loop: "{{ compose_files | default(['watchtower']) }}"
  register: compose_results

